<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
    <title>iPhone Calculator</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #333;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+/Edge */
            user-select: none; /* Standard */
        }

        .calculator {
            width: 320px;
            background-color: #000;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .display {
            background-color: #000;
            color: #fff;
            font-size: 6em;
            text-align: right;
            padding: 10px 15px;
            border-radius: 10px;
            min-height: 100px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            overflow-x: auto; /* Allow horizontal scrolling for large numbers */
            white-space: nowrap;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 2em;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s;
            color: #fff;
            outline: none;
        }

        .btn:active {
            filter: brightness(120%);
        }

        .btn.function {
            background-color: #a6a6a6; /* Light grey */
            color: #000;
        }

        .btn.operator {
            background-color: #ff9f0a; /* Orange */
        }

        .btn.number {
            background-color: #333333; /* Dark grey */
        }

        .btn.zero {
            grid-column: span 2;
            width: 100%;
            border-radius: 35px;
            justify-content: flex-start;
            padding-left: 25px;
        }

        /* Responsive font size for display */
        .display.small-font {
            font-size: 4em;
        }
        .display.smaller-font {
            font-size: 3em;
        }
        .display.smallest-font {
            font-size: 2em;
        }

        /* Media queries for very small screens if needed, but 320px width is standard */
        @media (max-width: 380px) {
            .calculator {
                width: 280px;
                padding: 15px;
            }
            .btn {
                width: 60px;
                height: 60px;
                font-size: 1.8em;
            }
            .display {
                font-size: 5em;
                min-height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn function" data-value="AC">AC</button>
            <button class="btn function" data-value="+/-">+/-</button>
            <button class="btn function" data-value="%">%</button>
            <button class="btn operator" data-value="/">÷</button>

            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-value="*">×</button>

            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-value="-">-</button>

            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-value="+">+</button>

            <button class="btn number zero" data-value="0">0</button>
            <button class="btn number" data-value=".">.</button>
            <button class="btn operator" data-value="=">=</button>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script>
        document.addEventListener('deviceready', onDeviceReady, false);

        function onDeviceReady() {
            // Cordova is now initialized. Have fun!  
            console.log('Running cordova-' + cordova.platformId + '@' + cordova.version);
            document.querySelector('.app')?.classList.add('ready'); // Example: show a ready state if .app exists
        }

        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('.btn');

        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let waitingForSecondOperand = false;
        let lastResult = null; // Store the last calculated result

        function updateDisplay() {
            let displayValue = currentInput;
            if (displayValue.length > 9) {
                displayValue = parseFloat(displayValue).toPrecision(7);
                if (displayValue.includes('e')) {
                    displayValue = parseFloat(displayValue).toExponential(2); // For very large/small numbers
                }
            }

            display.textContent = displayValue;

            // Adjust font size dynamically
            if (display.textContent.length > 9) {
                display.classList.add('small-font');
            } else {
                display.classList.remove('small-font');
            }
            if (display.textContent.length > 12) {
                display.classList.add('smaller-font');
            } else {
                display.classList.remove('smaller-font');
            }
            if (display.textContent.length > 16) {
                display.classList.add('smallest-font');
            } else {
                display.classList.remove('smallest-font');
            }
        }

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            waitingForSecondOperand = false;
            lastResult = null;
            updateDisplay();
            document.querySelector('.btn[data-value="AC"]').textContent = 'AC'; // Reset AC button
        }

        function inputDigit(digit) {
            if (waitingForSecondOperand) {
                currentInput = digit;
                waitingForSecondOperand = false;
            } else {
                currentInput = currentInput === '0' ? digit : currentInput + digit;
            }
            document.querySelector('.btn[data-value="AC"]').textContent = 'C'; // Change AC to C on input
            updateDisplay();
        }

        function inputDecimal() {
            if (waitingForSecondOperand) {
                currentInput = '0.';
                waitingForSecondOperand = false;
            }
            if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            document.querySelector('.btn[data-value="AC"]').textContent = 'C'; // Change AC to C on input
            updateDisplay();
        }

        function handleOperator(nextOperator) {
            const inputValue = parseFloat(currentInput);

            if (operator && waitingForSecondOperand) {
                operator = nextOperator;
                return;
            }

            if (previousInput === '') {
                previousInput = inputValue;
            } else if (operator) {
                const result = performCalculation[operator](previousInput, inputValue);
                currentInput = String(result);
                lastResult = result;
                previousInput = result;
            }

            waitingForSecondOperand = true;
            operator = nextOperator;
            updateDisplay();
        }

        function handleEquals() {
            if (operator === null || waitingForSecondOperand) return;

            const secondOperand = parseFloat(currentInput);
            const result = performCalculation[operator](previousInput, secondOperand);

            currentInput = String(result);
            lastResult = result;
            previousInput = ''; // Clear previous input after calculation
            operator = null; // Clear operator
            waitingForSecondOperand = false;
            updateDisplay();
            document.querySelector('.btn[data-value="AC"]').textContent = 'AC'; // Reset AC button
        }

        function toggleSign() {
            currentInput = String(parseFloat(currentInput) * -1);
            updateDisplay();
        }

        function calculatePercentage() {
            currentInput = String(parseFloat(currentInput) / 100);
            updateDisplay();
        }

        const performCalculation = {
            '/': (firstOperand, secondOperand) => firstOperand / secondOperand,
            '*': (firstOperand, secondOperand) => firstOperand * secondOperand,
            '+': (firstOperand, secondOperand) => firstOperand + secondOperand,
            '-': (firstOperand, secondOperand) => firstOperand - secondOperand,
            '=': (firstOperand, secondOperand) => secondOperand // This case is handled by equals function itself
        };

        buttons.forEach(button => {
            button.addEventListener('click', (event) => {
                const { value } = event.target.dataset;

                if (value === 'AC') {
                    clearAll();
                    return;
                }

                if (value === '+/-') {
                    toggleSign();
                    return;
                }

                if (value === '%') {
                    calculatePercentage();
                    return;
                }

                if (value === '=') {
                    handleEquals();
                    return;
                }

                if (['/', '*', '+', '-'].includes(value)) {
                    handleOperator(value);
                    return;
                }

                if (value === '.') {
                    inputDecimal();
                    return;
                }

                // Default for numbers
                inputDigit(value);
            });
        });

        updateDisplay(); // Initialize display on load

    </script>
</body>
</html>
